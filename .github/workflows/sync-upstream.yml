name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/akudamatata/Solara.git
          git fetch upstream main

      - name: Configure git & merge upstream
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || echo "Already up to date"

      - name: Keep only our workflow files
        run: |
          git checkout HEAD -- .github/workflows/sync-upstream.yml
          git rm -rf .github/workflows/ --ignore-unmatch
          git checkout HEAD -- .github/workflows/sync-upstream.yml
          git add .github/workflows/sync-upstream.yml

      - name: Push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
