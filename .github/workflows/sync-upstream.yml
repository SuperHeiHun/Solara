name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/akudamatata/Solara.git
          git fetch upstream --no-tags --prune

      - name: Merge upstream/main
        id: merge
        continue-on-error: true
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories

      - name: Check merge result
        id: check
        run: |
          if git diff --quiet HEAD origin/main; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.merge.outcome == 'success' && steps.check.outputs.changed == 'true'
        run: git push origin main

      - name: Create PR on conflict
        if: steps.merge.outcome == 'failure'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Sync with upstream (conflicts)'
          title: 'Auto Sync: merge upstream changes'
          body: |
            Merge conflicts detected. Please resolve them manually.
          branch: auto-sync-upstream
          base: main
