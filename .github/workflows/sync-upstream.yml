name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/akudamatata/Solara.git
          git fetch upstream main

      - name: Merge upstream without their workflows
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout main
          git merge upstream/main --no-commit --no-edit --allow-unrelated-histories || true
          git rm --cached -r .github/workflows/ 2>/dev/null || true
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true
          git commit --no-edit 2>/dev/null || true

      - name: Push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
